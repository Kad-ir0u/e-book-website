<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — 24 Hours Used Properly</title>
  <meta name="description" content="Reset your password on 24 Hours Used Properly to regain access to your account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">24 HOURS<span> USED PROPERLY</span></a>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">☰</button>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card fade-in">
      <h1>Forgot Password</h1>
      <p class="auth-subtitle">Enter your email and we'll send a reset link</p>
      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
          <p class="error-text">Please enter a valid email address</p>
        </div>
        <button type="submit" class="cta-btn-primary" style="width: 100%;">Send Reset Link</button>
      </form>
      <hr class="form-divider">
      <p class="form-footer">
        <a href="login.html">Back to Login</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
